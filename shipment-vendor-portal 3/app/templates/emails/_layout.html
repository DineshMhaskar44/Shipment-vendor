<!doctype html>
<html><head><meta charset="utf-8"></head>
<body style="font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; background:#f5f7fa; margin:0; padding:24px;">
  <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="max-width:620px;margin:0 auto;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06);">
    <tr><td style="background:#0d2b4d;color:#fff;padding:18px 24px;">
      <strong style="font-size:18px;">{% block header %}Shipment & Vendor Portal{% endblock %}</strong>
    </td></tr>
    <tr><td style="padding:24px;color:#212529;line-height:1.55;font-size:14px;">
      {% block body %}{% endblock %}
    </td></tr>
    <tr><td style="background:#f1f3f5;color:#6c757d;padding:14px 24px;font-size:12px;">
      Sent by Shipment & Vendor Portal — please do not reply to this email.
    </td></tr>
  </table>
</body></html>
